<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buffee's CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0d0b;
  --surface: #1a1714;
  --surface2: #222019;
  --border: #2e2a24;
  --border-light: #3a3530;
  --text: #d9cfc0;
  --text-dim: #8a7e70;
  --text-faint: #5a5048;
  --text-bright: #f0e6d6;
  --espresso: #d4763c;
  --espresso-dim: #a85a2e;
  --cream: #f5e6c8;
  --orange: #e8a838;
  --blue: #7ea8be;
  --green: #4a9d6e;
  --red: #d45c5c;
  --font: 'General Sans', -apple-system, sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

/* ===== LOGIN SCREEN ===== */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
  background: radial-gradient(ellipse at 30% 20%, #1a140e 0%, var(--bg) 70%);
}
.login-box {
  width: 100%; max-width: 380px; text-align: center;
  animation: slideUp 0.5s ease;
}
.login-logo { font-size: 48px; margin-bottom: 16px; }
.login-title {
  font-family: var(--font-display); font-size: 28px; font-weight: 700;
  color: var(--text-bright); margin-bottom: 6px;
}
.login-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; }
.login-input {
  width: 100%; padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  color: var(--text); font-size: 15px; font-family: var(--font);
  text-align: center; letter-spacing: 2px;
  transition: border-color 0.2s;
}
.login-input:focus { outline: none; border-color: var(--espresso); }
.login-input::placeholder { letter-spacing: 0; color: var(--text-faint); }
.login-btn {
  width: 100%; padding: 14px; margin-top: 14px;
  background: var(--espresso); color: #fff; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 600; font-family: var(--font);
  cursor: pointer; transition: background 0.2s;
}
.login-btn:hover { background: var(--espresso-dim); }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }

/* ===== APP SHELL ===== */
#app { display: none; animation: fadeIn 0.3s ease; }

/* Header */
.header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
}
.header-left { flex: 1 1 auto; display: flex; align-items: center; gap: 12px; }
.header-icon { font-size: 24px; }
.header h1 {
  font-family: var(--font-display); font-size: 20px; font-weight: 700;
  color: var(--text-bright); letter-spacing: -0.5px;
}
.header-sub { font-size: 11px; color: var(--text-faint); }
.header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

/* Buttons */
.btn {
  border: none; border-radius: 10px; padding: 9px 20px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: all 0.15s; display: inline-flex;
  align-items: center; gap: 6px;
}
.btn-primary { background: var(--espresso); color: #fff; }
.btn-primary:hover { background: var(--espresso-dim); }
.btn-ghost { background: var(--surface2); color: var(--text-dim); }
.btn-ghost:hover { color: var(--text); }
.btn-small { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
.btn-danger { background: #3a2020; color: var(--red); }
.btn-danger:hover { background: #4a2525; }

/* Stats row */
.stats { display: flex; gap: 12px; flex-wrap: wrap; padding: 20px 24px 0; }
.stat-card {
  background: var(--surface); border-radius: 12px; padding: 16px 20px;
  border: 1px solid var(--border); flex: 1 1 150px; min-width: 150px;
}
.stat-label {
  font-size: 10px; color: var(--text-faint); text-transform: uppercase;
  letter-spacing: 1px; font-weight: 700; margin-bottom: 6px;
}
.stat-value {
  font-family: var(--font-display); font-size: 24px; font-weight: 700;
  color: var(--text-bright);
}
.stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Toolbar */
.toolbar {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 18px 24px;
}
.view-toggle {
  display: flex; border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border);
}
.view-toggle button {
  padding: 8px 18px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; font-family: var(--font);
  background: transparent; color: var(--text-faint); transition: all 0.15s;
}
.view-toggle button.active { background: var(--surface2); color: var(--text-bright); }

/* Inputs */
.input, .select {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 12px; color: var(--text);
  font-size: 13px; font-family: var(--font); transition: border-color 0.15s;
}
.input:focus, .select:focus { outline: none; border-color: var(--espresso); }
.input::placeholder { color: var(--text-faint); }
.select { cursor: pointer; }

/* ===== PIPELINE VIEW ===== */
.pipeline {
  display: flex; gap: 10px; overflow-x: auto; padding: 0 24px 20px;
  min-height: 350px;
}
.pipeline-col {
  min-width: 190px; flex: 1 0 190px; background: var(--surface);
  border-radius: 12px; padding: 14px 10px;
}
.pipeline-col-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding: 0 4px;
}
.pipeline-dot { width: 9px; height: 9px; border-radius: 50%; }
.pipeline-col-title {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.8px;
}
.pipeline-count {
  margin-left: auto; font-size: 10px; background: var(--surface2);
  color: var(--text-faint); border-radius: 10px; padding: 2px 8px; font-weight: 600;
}
.pipeline-cards { display: flex; flex-direction: column; gap: 8px; }

.lead-card {
  background: var(--surface2); border-radius: 10px; padding: 12px 14px;
  cursor: pointer; border: 1px solid var(--border);
  transition: border-color 0.15s, transform 0.15s;
}
.lead-card:hover { border-color: var(--border-light); transform: translateY(-1px); }
.lead-card-name { font-weight: 600; font-size: 13px; color: var(--text-bright); margin-bottom: 3px; }
.lead-card-type { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.lead-card-revenue { font-size: 12px; color: var(--green); font-weight: 600; }
.lead-card-followup {
  font-size: 10px; margin-top: 6px; padding: 3px 8px;
  border-radius: 6px; display: inline-block; font-weight: 500;
}
.followup-overdue { background: #3a1c1c; color: #e87c7c; }
.followup-soon { background: #3a3018; color: #e8c458; }
.followup-ok { background: #1e2a1e; color: #6aad7a; }

/* ===== TABLE VIEW ===== */
.table-wrap { overflow-x: auto; padding: 0 24px 20px; }
table { width: 100%; border-collapse: separate; border-spacing: 0 3px; font-size: 13px; }
th {
  text-align: left; padding: 8px 12px; color: var(--text-faint);
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; border-bottom: 1px solid var(--border);
}
td {
  padding: 10px 12px; color: var(--text-dim);
  border-bottom: 1px solid var(--surface); transition: background 0.1s;
}
tr:hover td { background: var(--surface); }
tr { cursor: pointer; }
.stage-pill {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  font-weight: 600; white-space: nowrap; display: inline-block;
}
.type-pill {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: var(--surface2); color: var(--text-dim); white-space: nowrap;
  display: inline-block;
}
.delete-btn {
  background: none; border: none; color: var(--text-faint);
  cursor: pointer; font-size: 16px; padding: 2px 6px; transition: color 0.15s;
}
.delete-btn:hover { color: var(--red); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(15,13,11,0.6); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--surface); border: 1px solid var(--border-light);
  border-radius: 16px; max-width: 580px; width: 94%; max-height: 90vh;
  overflow-y: auto; padding: 28px 30px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  animation: slideUp 0.2s ease;
}
.modal h2 {
  font-family: var(--font-display); font-size: 22px; font-weight: 700;
  color: var(--text-bright); margin-bottom: 20px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-label {
  font-size: 10px; color: var(--text-faint); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-input {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; color: var(--text);
  font-size: 13px; font-family: var(--font); transition: border-color 0.15s;
  width: 100%;
}
.form-input:focus { outline: none; border-color: var(--espresso); }

/* Notes section */
.notes-list { margin-top: 8px; }
.note-item {
  display: flex; align-items: flex-start; gap: 8px; margin-top: 6px;
  background: var(--bg); border-radius: 8px; padding: 8px 12px; font-size: 12px;
}
.note-date { color: var(--text-faint); white-space: nowrap; flex-shrink: 0; }
.note-text { color: var(--text); flex: 1; line-height: 1.4; }
.note-remove {
  background: none; border: none; color: var(--text-faint);
  cursor: pointer; font-size: 14px; padding: 0; line-height: 1;
}
.note-remove:hover { color: var(--red); }
.note-add { display: flex; gap: 8px; margin-top: 10px; }

.form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

/* Empty state */
.empty {
  text-align: center; padding: 60px 20px; color: var(--text-faint);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* Loading overlay */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--text-dim); font-size: 14px;
  gap: 10px;
}
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--espresso); animation: pulse 1s ease infinite;
}

/* Responsive */
@media (max-width: 640px) {
  .header { padding: 16px; }
  .stats { padding: 16px 16px 0; }
  .toolbar { padding: 14px 16px; }
  .pipeline { padding: 0 16px 16px; }
  .table-wrap { padding: 0 16px 16px; }
  .form-grid { grid-template-columns: 1fr; }
  .modal { padding: 22px 20px; }
  .stat-card { min-width: 130px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">☕</div>
    <div class="login-title">Buffee's CRM</div>
    <div class="login-sub">Enter your password to continue</div>
    <input type="password" id="login-password" class="login-input" placeholder="Password" autofocus>
    <button id="login-btn" class="login-btn">Sign In</button>
    <div id="login-error" class="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-icon">☕</span>
      <div>
        <h1>Buffee's CRM</h1>
        <div class="header-sub">Lead pipeline & relationship tracker</div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost btn-small" id="refresh-btn" title="Refresh data">↻ Sync</button>
      <button class="btn btn-primary" id="new-lead-btn">
        <span style="font-size:17px;line-height:1;">+</span> New Lead
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats-row"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="view-toggle">
      <button class="active" data-view="pipeline">Pipeline</button>
      <button data-view="table">Table</button>
    </div>
    <input class="input" id="search-input" placeholder="Search leads..." style="max-width:200px;">
    <select class="select" id="filter-type" style="max-width:200px;">
      <option value="All">All types</option>
      <option value="Gym / Fitness Studio">Gym / Fitness Studio</option>
      <option value="Event Venue / Pop-up">Event Venue / Pop-up</option>
      <option value="Corporate / Office Catering">Corporate / Office Catering</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <!-- Pipeline View -->
  <div id="pipeline-view" class="pipeline"></div>

  <!-- Table View -->
  <div id="table-view" class="table-wrap" style="display:none;"></div>
</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script>
// ===== CONFIG =====
const CONFIG = {
  SHEET_ID: '1_cFREDMylVuxS33KVmGEnzXd3PlU3Jmxjsdt8ZaEDp8',
  API_KEY: 'AIzaSyD8Z8vpxYPkfCKS_MLo36_dIAKHI5y1ajU',
  SHEET_NAME: 'Sheet1',
  // Change these passwords as needed. Store the SHA-256 hash for basic security.
  // Default passwords: "buffees2026" and "heather2026"
  // To change: open browser console, run: crypto.subtle.digest('SHA-256', new TextEncoder().encode('yourpassword')).then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
  PASSWORD_HASHES: [
    'a]PLACEHOLDER[', // Will be set on first run
  ],
  USE_SIMPLE_PASSWORDS: true,
  SIMPLE_PASSWORDS: ['buffees2026', 'heather2026']
};

const LEAD_TYPES = ['Gym / Fitness Studio', 'Event Venue / Pop-up', 'Corporate / Office Catering', 'Other'];
const PIPELINE_STAGES = ['Cold Lead', 'Contacted', 'Meeting Booked', 'Proposal Sent', 'Won', 'Lost'];
const STAGE_COLORS = {
  'Cold Lead': '#7ea8be', 'Contacted': '#e8a838', 'Meeting Booked': '#d4763c',
  'Proposal Sent': '#c25d3a', 'Won': '#4a9d6e', 'Lost': '#8b8b8b'
};
const PACKAGE_TIERS = ['Pop-up (one-off)', 'Recurring Partnership', 'Catering Package - Basic', 'Catering Package - Premium', 'Custom / TBD'];
const COLUMNS = ['id','name','contact','email','phone','type','stage','package','revenue','notes','followUp','createdAt'];

let leads = [];
let currentView = 'pipeline';
let searchTerm = '';
let filterType = 'All';

// ===== GOOGLE SHEETS API =====
const SHEETS_BASE = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`;

async function sheetsGet(range) {
  const url = `${SHEETS_BASE}/values/${encodeURIComponent(range)}?key=${CONFIG.API_KEY}&valueRenderOption=UNFORMATTED_VALUE`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheets GET failed: ${res.status}`);
  return res.json();
}

async function sheetsUpdate(range, values) {
  const url = `${SHEETS_BASE}/values/${encodeURIComponent(range)}?key=${CONFIG.API_KEY}&valueInputOption=RAW`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, majorDimension: 'ROWS', values })
  });
  if (!res.ok) throw new Error(`Sheets UPDATE failed: ${res.status}`);
  return res.json();
}

async function sheetsAppend(values) {
  const range = `${CONFIG.SHEET_NAME}!A:L`;
  const url = `${SHEETS_BASE}/values/${encodeURIComponent(range)}:append?key=${CONFIG.API_KEY}&valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, majorDimension: 'ROWS', values })
  });
  if (!res.ok) throw new Error(`Sheets APPEND failed: ${res.status}`);
  return res.json();
}

async function sheetsClear(range) {
  const url = `${SHEETS_BASE}/values/${encodeURIComponent(range)}:clear?key=${CONFIG.API_KEY}`;
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
  if (!res.ok) throw new Error(`Sheets CLEAR failed: ${res.status}`);
  return res.json();
}

function rowToLead(row) {
  return {
    id: row[0] || generateId(),
    name: row[1] || '',
    contact: row[2] || '',
    email: row[3] || '',
    phone: row[4] || '',
    type: row[5] || 'Other',
    stage: row[6] || 'Cold Lead',
    package: row[7] || 'Custom / TBD',
    revenue: Number(row[8]) || 0,
    notes: parseNotes(row[9]),
    followUp: row[10] || '',
    createdAt: row[11] || today()
  };
}

function leadToRow(l) {
  return [l.id, l.name, l.contact, l.email, l.phone, l.type, l.stage, l.package, l.revenue, serializeNotes(l.notes), l.followUp, l.createdAt];
}

function parseNotes(str) {
  if (!str) return [];
  try { return JSON.parse(str); } catch { return []; }
}
function serializeNotes(notes) { return JSON.stringify(notes || []); }

async function loadLeads() {
  try {
    const data = await sheetsGet(`${CONFIG.SHEET_NAME}!A2:L1000`);
    leads = (data.values || []).filter(r => r[0]).map(rowToLead);
  } catch (e) {
    console.error('Load failed:', e);
    alert('Failed to load data from Google Sheets. Check your API key and Sheet ID.');
  }
}

async function saveLead(lead) {
  const idx = leads.findIndex(l => l.id === lead.id);
  if (idx >= 0) {
    leads[idx] = lead;
    const rowNum = idx + 2; // +1 for header, +1 for 1-indexed
    await sheetsUpdate(`${CONFIG.SHEET_NAME}!A${rowNum}:L${rowNum}`, [leadToRow(lead)]);
  } else {
    leads.push(lead);
    await sheetsAppend([leadToRow(lead)]);
  }
}

async function deleteLead(id) {
  leads = leads.filter(l => l.id !== id);
  // Rewrite all data (simplest approach for deletion)
  await sheetsClear(`${CONFIG.SHEET_NAME}!A2:L1000`);
  if (leads.length > 0) {
    await sheetsUpdate(`${CONFIG.SHEET_NAME}!A2:L${leads.length + 1}`, leads.map(leadToRow));
  }
}

// ===== HELPERS =====
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function today() { return new Date().toISOString().split('T')[0]; }

function formatDate(d) {
  if (!d) return '';
  const date = new Date(d + 'T00:00:00');
  return date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
}

function isOverdue(d) {
  if (!d) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  return new Date(d + 'T00:00:00') < t;
}

function isDueSoon(d) {
  if (!d) return false;
  const t = new Date(); t.setHours(0,0,0,0);
  const diff = (new Date(d + 'T00:00:00') - t) / 864e5;
  return diff >= 0 && diff <= 3;
}

function followupClass(d) {
  if (isOverdue(d)) return 'followup-overdue';
  if (isDueSoon(d)) return 'followup-soon';
  return 'followup-ok';
}

function followupLabel(d) {
  if (isOverdue(d)) return 'Overdue';
  return 'Follow-up';
}

// ===== AUTH =====
function checkPassword(pwd) {
  if (CONFIG.USE_SIMPLE_PASSWORDS) {
    return CONFIG.SIMPLE_PASSWORDS.includes(pwd);
  }
  return false;
}

document.getElementById('login-btn').addEventListener('click', tryLogin);
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

async function tryLogin() {
  const pwd = document.getElementById('login-password').value;
  if (checkPassword(pwd)) {
    sessionStorage.setItem('buffees-auth', '1');
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-password').value = '';
    document.getElementById('login-password').focus();
  }
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadLeads();
  render();
}

// Auto-login if already authed this session
if (sessionStorage.getItem('buffees-auth') === '1') {
  showApp();
}

// ===== VIEW TOGGLE =====
document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  });
});

document.getElementById('search-input').addEventListener('input', e => { searchTerm = e.target.value; render(); });
document.getElementById('filter-type').addEventListener('change', e => { filterType = e.target.value; render(); });
document.getElementById('new-lead-btn').addEventListener('click', () => openModal(null));
document.getElementById('refresh-btn').addEventListener('click', async () => {
  document.getElementById('refresh-btn').textContent = '↻ Syncing...';
  await loadLeads();
  render();
  document.getElementById('refresh-btn').textContent = '↻ Sync';
});

// ===== RENDER =====
function getFiltered() {
  return leads.filter(l => {
    const matchSearch = !searchTerm ||
      l.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
      l.contact.toLowerCase().includes(searchTerm.toLowerCase());
    const matchType = filterType === 'All' || l.type === filterType;
    return matchSearch && matchType;
  });
}

function render() {
  renderStats();
  const filtered = getFiltered();
  if (currentView === 'pipeline') {
    document.getElementById('pipeline-view').style.display = 'flex';
    document.getElementById('table-view').style.display = 'none';
    renderPipeline(filtered);
  } else {
    document.getElementById('pipeline-view').style.display = 'none';
    document.getElementById('table-view').style.display = 'block';
    renderTable(filtered);
  }
}

function renderStats() {
  const active = leads.filter(l => l.stage !== 'Won' && l.stage !== 'Lost');
  const won = leads.filter(l => l.stage === 'Won');
  const pipeVal = active.reduce((s, l) => s + (l.revenue || 0), 0);
  const wonVal = won.reduce((s, l) => s + (l.revenue || 0), 0);
  const overdue = leads.filter(l => isOverdue(l.followUp) && l.stage !== 'Won' && l.stage !== 'Lost').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Active Leads</div>
      <div class="stat-value">${active.length}</div>
      <div class="stat-sub">${leads.length} total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pipeline Value</div>
      <div class="stat-value" style="color:var(--orange)">$${pipeVal.toLocaleString()}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Won Revenue</div>
      <div class="stat-value" style="color:var(--green)">$${wonVal.toLocaleString()}</div>
      <div class="stat-sub">${won.length} closed</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Overdue</div>
      <div class="stat-value" style="color:${overdue > 0 ? 'var(--red)' : 'var(--green)'}">${overdue}</div>
      <div class="stat-sub">${overdue > 0 ? 'Needs attention' : 'All clear'}</div>
    </div>
  `;
}

function renderPipeline(filtered) {
  const stages = PIPELINE_STAGES.filter(s => s !== 'Lost');
  document.getElementById('pipeline-view').innerHTML = stages.map(stage => {
    const stageLeads = filtered.filter(l => l.stage === stage);
    return `
      <div class="pipeline-col" style="border-top: 2px solid ${STAGE_COLORS[stage]}20">
        <div class="pipeline-col-header">
          <div class="pipeline-dot" style="background:${STAGE_COLORS[stage]}"></div>
          <span class="pipeline-col-title">${stage}</span>
          <span class="pipeline-count">${stageLeads.length}</span>
        </div>
        <div class="pipeline-cards">
          ${stageLeads.map(l => `
            <div class="lead-card" onclick="openModal('${l.id}')">
              <div class="lead-card-name">${esc(l.name)}</div>
              <div class="lead-card-type">${esc(l.type)}</div>
              ${l.revenue > 0 ? `<div class="lead-card-revenue">$${l.revenue.toLocaleString()}</div>` : ''}
              ${l.followUp ? `<div class="lead-card-followup ${followupClass(l.followUp)}">${followupLabel(l.followUp)}: ${formatDate(l.followUp)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderTable(filtered) {
  document.getElementById('table-view').innerHTML = `
    <table>
      <thead><tr>
        ${['Business','Contact','Type','Stage','Package','Revenue','Follow-up',''].map(h => `<th>${h}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${filtered.map(l => `
          <tr onclick="openModal('${l.id}')">
            <td style="font-weight:600;color:var(--text-bright)">${esc(l.name)}</td>
            <td>${esc(l.contact)}</td>
            <td><span class="type-pill">${esc(l.type)}</span></td>
            <td><span class="stage-pill" style="background:${STAGE_COLORS[l.stage]}22;color:${STAGE_COLORS[l.stage]}">${l.stage}</span></td>
            <td style="font-size:12px">${esc(l.package)}</td>
            <td style="color:${l.revenue > 0 ? 'var(--green)' : 'var(--text-faint)'};font-weight:600">${l.revenue > 0 ? '$' + l.revenue.toLocaleString() : '—'}</td>
            <td>${l.followUp ? `<span class="lead-card-followup ${followupClass(l.followUp)}" style="font-size:11px">${formatDate(l.followUp)}</span>` : '—'}</td>
            <td><button class="delete-btn" onclick="event.stopPropagation();confirmDelete('${l.id}')">×</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    ${filtered.length === 0 ? '<div class="empty"><div class="empty-icon">☕</div><div class="empty-text">No leads found.</div></div>' : ''}
  `;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ===== MODAL =====
function openModal(idOrNull) {
  const lead = idOrNull ? leads.find(l => l.id === idOrNull) : null;
  const isEdit = !!lead;
  const f = lead || {
    id: generateId(), name: '', contact: '', email: '', phone: '',
    type: LEAD_TYPES[0], stage: PIPELINE_STAGES[0], package: PACKAGE_TIERS[4],
    revenue: 0, notes: [], followUp: '', createdAt: today()
  };

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>${isEdit ? 'Edit Lead' : 'New Lead'}</h2>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Business Name *</label><input class="form-input" id="f-name" value="${esc(f.name)}" placeholder="e.g. Iron Republic Gym"></div>
          <div class="form-group"><label class="form-label">Contact Person</label><input class="form-input" id="f-contact" value="${esc(f.contact)}" placeholder="Name"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="f-email" type="email" value="${esc(f.email)}" placeholder="email@example.com"></div>
          <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="f-phone" value="${esc(f.phone)}" placeholder="416-..."></div>
          <div class="form-group"><label class="form-label">Lead Type</label><select class="form-input" id="f-type">${LEAD_TYPES.map(t => `<option ${t===f.type?'selected':''}>${t}</option>`).join('')}</select></div>
          <div class="form-group"><label class="form-label">Pipeline Stage</label><select class="form-input" id="f-stage">${PIPELINE_STAGES.map(s => `<option ${s===f.stage?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="form-group"><label class="form-label">Package Tier</label><select class="form-input" id="f-package">${PACKAGE_TIERS.map(p => `<option ${p===f.package?'selected':''}>${p}</option>`).join('')}</select></div>
          <div class="form-group"><label class="form-label">Est. Revenue ($)</label><input class="form-input" id="f-revenue" type="number" value="${f.revenue || ''}"></div>
          <div class="form-group full"><label class="form-label">Follow-up Date</label><input class="form-input" id="f-followup" type="date" value="${f.followUp}"></div>
        </div>

        <div style="margin-top:18px">
          <label class="form-label">Notes / Activity Log</label>
          <div class="notes-list" id="notes-list">
            ${(f.notes || []).map((n, i) => `
              <div class="note-item">
                <span class="note-date">${formatDate(n.date)}</span>
                <span class="note-text">${esc(n.text)}</span>
                <button class="note-remove" onclick="removeNote(${i})">×</button>
              </div>
            `).join('')}
          </div>
          <div class="note-add">
            <input class="form-input" id="f-newnote" placeholder="Add a note..." style="flex:1" onkeydown="if(event.key==='Enter')addNote()">
            <button class="btn btn-ghost btn-small" onclick="addNote()">Add</button>
          </div>
        </div>

        <div class="form-actions">
          ${isEdit ? `<button class="btn btn-danger btn-small" onclick="confirmDelete('${f.id}');closeModal()">Delete</button>` : ''}
          <div style="flex:1"></div>
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveForm('${f.id}', ${isEdit})">${isEdit ? 'Save Changes' : 'Add Lead'}</button>
        </div>
      </div>
    </div>
  `;

  // Store notes in a temp var for manipulation
  window._modalNotes = [...(f.notes || [])];
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
  window._modalNotes = [];
}

window.addNote = function() {
  const input = document.getElementById('f-newnote');
  if (!input.value.trim()) return;
  window._modalNotes.push({ date: today(), text: input.value.trim() });
  input.value = '';
  refreshNotesDisplay();
};

window.removeNote = function(i) {
  window._modalNotes.splice(i, 1);
  refreshNotesDisplay();
};

function refreshNotesDisplay() {
  document.getElementById('notes-list').innerHTML = window._modalNotes.map((n, i) => `
    <div class="note-item">
      <span class="note-date">${formatDate(n.date)}</span>
      <span class="note-text">${esc(n.text)}</span>
      <button class="note-remove" onclick="removeNote(${i})">×</button>
    </div>
  `).join('');
}

window.saveForm = async function(id, isEdit) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Business name is required.'); return; }

  const lead = {
    id,
    name,
    contact: document.getElementById('f-contact').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    type: document.getElementById('f-type').value,
    stage: document.getElementById('f-stage').value,
    package: document.getElementById('f-package').value,
    revenue: Number(document.getElementById('f-revenue').value) || 0,
    notes: window._modalNotes,
    followUp: document.getElementById('f-followup').value,
    createdAt: isEdit ? (leads.find(l => l.id === id)?.createdAt || today()) : today()
  };

  try {
    await saveLead(lead);
    closeModal();
    render();
  } catch (e) {
    console.error('Save error:', e);
    alert('Failed to save. Check your connection and try again.');
  }
};

window.confirmDelete = async function(id) {
  if (!confirm('Remove this lead? This cannot be undone.')) return;
  try {
    await deleteLead(id);
    closeModal();
    render();
  } catch (e) {
    console.error('Delete error:', e);
    alert('Failed to delete. Try again.');
  }
};

window.openModal = openModal;
</script>
</body>
</html>
